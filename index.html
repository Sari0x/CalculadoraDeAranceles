<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Aranceles</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Calculadora de Aranceles</h1>
            <p class="subtitle">Gestión de comisiones y recargos</p>
        </header>

        <main>
            <section class="card calculator-section">
                <h2>Calculadora de Markup</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label for="comision">Comisión (%)</label>
                        <input type="text" id="comision" placeholder="Ej: 30" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="recupero">Recupero (%)</label>
                        <input type="text" id="recupero" placeholder="Ej: 5" inputmode="decimal">
                    </div>
                </div>
                <div class="input-group">
                    <label for="iva">IVA (Fijo)</label>
                    <input type="text" id="iva" value="21%" disabled>
                </div>
                <div class="result-box">
                    <span class="result-label">Markup Final</span>
                    <span id="markup-result" class="result-value">---</span>
                </div>
                
                <div id="save-area" style="display: none; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 10px;">
                    <div class="input-group">
                        <label for="new-store-name">Nombre de la Tienda</label>
                        <input type="text" id="new-store-name" placeholder="Ej: Tienda BNA">
                    </div>
                    <div class="input-group">
                        <label for="new-store-image">Imagen (Opcional)</label>
                        <input type="file" id="new-store-image" accept="image/*">
                    </div>
                    <button id="add-to-list-btn" class="btn btn-primary">Guardar en Lista</button>
                </div>
            </section>

            <section class="card calculator-section">
                <h2>Ajuste de Recargo</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label for="recargo-actual">Recargo Actual (%)</label>
                        <input type="text" id="recargo-actual" placeholder="Ej: 80" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label for="recargo-objetivo">Recargo Objetivo (%)</label>
                        <input type="text" id="recargo-objetivo" placeholder="Ej: 45" inputmode="decimal">
                    </div>
                </div>
                <div class="result-box">
                    <span class="result-label">Ajuste Necesario</span>
                    <span id="ajuste-result" class="result-value">---</span>
                </div>
            </section>

            <section class="card list-section">
                <h2>Aranceles Guardados</h2>
                <div id="tariffs-list" class="tariffs-list-container">
                    <p class="empty-msg">Cargando aranceles...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
